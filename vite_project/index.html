<!DOCTYPE html>
<html>
<body>

<h2>bannermulti x2 Test</h2>


<script type="module">
    const manifest = await fetch('/cdn/index.json').then(r => r.json());

    import { mount } from './src/widget.ts';

    const configs = await Promise.all(
        manifest.contracts.map(async (url) => {
            const data = await fetch(url).then(r => r.json());

            return {
                url,
                id: url.split('/').pop(),
                version: data.version || 'v1',
                data
            };
        })
    );

    function pickRandom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    const widths = [280, 320, 480, 768, 1024, 1440];

    const root = document.getElementById('root');

    const instances = 10 + Math.floor(Math.random() * 10);

    const instancesMap = [];

    for (let i = 0; i < instances; i++) {
        const container = document.createElement('div');

        const width = pickRandom(widths);
        container.style.width = width + 'px';
        container.style.margin = '10px';
        container.style.border = '1px dashed #ccc';
        container.style.display = 'flex';
        container.style.gap = '10px';

        const widgetWrapper = document.createElement('div');
        widgetWrapper.style.flex = '1';

        const el = document.createElement('bannermulti-widget');
        widgetWrapper.appendChild(el);

        const contractViewer = document.createElement('pre');

        container.appendChild(widgetWrapper);
        container.appendChild(contractViewer);

        root.appendChild(container);

        instancesMap.push({ el, width, contractViewer });
    }

    function delay(ms) {
        return new Promise(r => setTimeout(r, ms));
    }

    await Promise.all(
        instancesMap.map(async ({ el, width, contractViewer }) => {
            const config = pickRandom(configs);

            await delay(Math.random() * 300);

            // ✅ render contract in the correct viewer
            contractViewer.textContent = JSON.stringify({
                width: `${width}px`,
                id: config.id,
                category: config.category,
                slides: config.data.data.slides.length,
                mode: config.data.data.settings.mode,
                visibleSlides: config.data.data.settings.visibleSlides,
                imageDimensions: `(${config.data.data.settings.imageWidth}px, ${config.data.data.settings.imageHeight}px)`
            }, null, 2);

            requestAnimationFrame(() => {
                mount(el, config.data);
            });
        })
    );
</script>

<div id="root"></div>

</body>
</html>
